<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Replay</title>
  <style>
    /* Import UI fonts */
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Theme variables */
    :root {
      --bg: #0e0e10;
      --surface: #18181b;
      --border: #2a2a2f;
      --text: #efeff1;
      --muted: #6e6e78;
      --purple: #9147ff;
      --purple-dim: rgba(145, 71, 255, 0.14);
      --white-dim: rgba(255,255,255,0.05);
    }

    /* Popup container */
    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', -apple-system, sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 16px 11px;
      border-bottom: 1px solid var(--border);
    }

    .header-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.1px;
      flex: 1;
    }

    /* Main content area */
    .content {
      padding: 11px 14px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    /* Section label */
    .row-label {
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    /* Slider card */
    .slider-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .slider-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 9px;
      gap: 8px;
    }

    .val-input-wrap {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    /* Inline numeric input */
    .val-input {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      outline: none;
      width: 36px;
      text-align: right;
      padding: 1px 2px;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    /* Hide number spinners */
    .val-input::-webkit-outer-spin-button,
    .val-input::-webkit-inner-spin-button { -webkit-appearance: none; }

    .val-input:focus {
      border-bottom-color: var(--purple);
    }

    .val-unit {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }

    .slider-range {
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* Range slider */
    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right,
        var(--purple) 0%,
        var(--purple) var(--pct, 45%),
        var(--border) var(--pct, 45%),
        var(--border) 100%);
      border-radius: 2px;
      outline: none;
    }

    /* Slider thumb (WebKit) */
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 3.5px var(--purple);
      transition: transform 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.15); }

    /* Slider thumb (Firefox) */
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #fff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 2px var(--bg), 0 0 0 3.5px var(--purple);
    }

    /* Key binding section */
    .key-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
    }

    .key-capture-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .key-capture-btn:hover { border-color: var(--purple); }

    /* Listening state animation */
    .key-capture-btn.listening {
      border-color: var(--purple);
      background: var(--purple-dim);
      animation: blink 0.9s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { border-color: var(--purple); }
      50% { border-color: rgba(145, 71, 255, 0.25); }
    }

    .key-display {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text);
    }

    .key-hint {
      font-size: 10px;
      color: var(--muted);
      transition: color 0.15s;
    }

    .key-capture-btn.listening .key-hint { color: var(--purple); }

    /* Toggle switches */
    .toggles {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .toggle-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      cursor: pointer;
      transition: background 0.1s;
    }

    .toggle-item:not(:last-child) { border-bottom: 1px solid var(--border); }
    .toggle-item:hover { background: var(--white-dim); }

    .toggle-label { font-size: 12px; color: var(--text); }

    /* Switch control */
    .switch { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .switch input { display: none; }

    .switch-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 9px;
      transition: background 0.2s;
    }

    .switch input:checked + .switch-track { background: var(--purple); }

    .switch-thumb {
      position: absolute;
      top: 2px; left: 2px;
      width: 14px; height: 14px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .switch input:checked ~ .switch-thumb { transform: translateX(14px); }

    /* Footer buttons */
    .footer {
      display: flex;
      gap: 8px;
      padding: 10px 14px 13px;
      border-top: 1px solid var(--border);
    }

    button.btn {
      flex: 1;
      padding: 9px 0;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-reset {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-reset:hover { color: var(--text); border-color: #444; }

    .btn-save { background: var(--purple); color: #fff; }
    .btn-save:hover { background: #772ce8; }

    /* Toast notification */
    .toast {
      position: absolute;
      bottom: 58px;
      left: 14px; right: 14px;
      padding: 7px 11px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(5px);
      transition: all 0.2s;
      pointer-events: none;
      z-index: 10;
    }

    .toast.show { opacity: 1; transform: translateY(0); }

    .toast.success {
      background: #0e1f12;
      color: #00c853;
      border: 1px solid rgba(0,200,83,0.25);
    }

    .toast.error {
      background: #1f0e0e;
      color: #ff5252;
      border: 1px solid rgba(255,82,82,0.25);
    }
  </style>
</head>
<body>

  <!-- Header with icon and title -->
  <div class="header">
    <!-- Inline SVG logo -->
    <svg class="header-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="20" height="20" rx="4" fill="#0e0e10"/>
      <rect x="3.8" y="4.2" width="2.4" height="11.6" rx="1.2" fill="#9147ff"/>
      <polygon points="7.6,4.2 16.2,10 7.6,15.8" fill="#9147ff"/>
    </svg>
    <h1>Stream Replay</h1>
  </div>

  <!-- Settings content -->
  <div class="content">

    <!-- Replay duration setting -->
    <div class="slider-row">
      <p class="row-label">Replay Duration</p>
      <div class="slider-top">
        <div class="val-input-wrap">
          <input class="val-input" type="number" id="durationInput" min="10" max="60" value="30">
          <span class="val-unit">s</span>
        </div>
        <span class="slider-range">5 – 60s</span>
      </div>
      <input type="range" id="replayDuration" min="5" max="60" value="30" step="1">
    </div>

    <!-- Volume reduction setting -->
    <div class="slider-row">
      <p class="row-label">Volume Reduction During Replay</p>
      <div class="slider-top">
        <div class="val-input-wrap">
          <input class="val-input" type="number" id="volumeInput" min="0" max="100" value="30">
          <span class="val-unit">%</span>
        </div>
        <span class="slider-range">0 – 100%</span>
      </div>
      <input type="range" id="volumeReduction" min="0" max="100" value="30" step="5">
    </div>

    <!-- Key binding setting -->
    <div class="key-row">
      <p class="row-label">Trigger Key</p>
      <button class="key-capture-btn" id="keyCapture" type="button">
        <span class="key-display" id="keyDisplay">← Left Arrow</span>
        <span class="key-hint" id="keyHint">click to change</span>
      </button>
    </div>

    <!-- Toggle settings -->
    <div class="toggles">
      <label class="toggle-item">
        <span class="toggle-label">Auto-close when replay ends</span>
        <label class="switch">
          <input type="checkbox" id="autoCloseReplay" checked>
          <span class="switch-track"></span>
          <span class="switch-thumb"></span>
        </label>
      </label>
      <label class="toggle-item">
        <span class="toggle-label">Remember window position</span>
        <label class="switch">
          <input type="checkbox" id="rememberWindowPosition">
          <span class="switch-track"></span>
          <span class="switch-thumb"></span>
        </label>
      </label>
    </div>

  </div>

  <!-- Toast notifications -->
  <div class="toast" id="toast"></div>

  <!-- Footer actions -->
  <div class="footer">
    <button class="btn btn-reset" id="resetBtn">Reset</button>
    <button class="btn btn-save" id="saveBtn">Save Settings</button>
  </div>

  <!-- Popup logic -->
  <script src="popup.js"></script>
</body>
</html>
